[tool.uv.workspace]
members = [
    "src/atlas_chat",
    "src/atlas_chat_validation_tools",
    "src/github_app_posting",
]

[tool.uv.sources]
atlas_chat = { workspace = true }
github_app_posting = { workspace = true }
# Dev-time override: resolve paperqa2-cyberian from the local checkout until
# the relaxed Python pin (>=3.13) is pushed to origin/main. Switch back to
# the git+https form in src/atlas_chat/pyproject.toml once published.
paperqa2-cyberian = { path = "../paperqa2_cyberian", editable = true }

[tool.uv]
managed = true
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "sphinx>=7.3.0",
    "sphinx-autodoc-typehints>=1.25.0",
    "myst-parser>=2.0.0",
    "pre-commit>=3.7.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'unit'"
markers = [
    "unit: fast, isolated tests",
    "integration: real API and IO tests",
]

[tool.ruff]
src = ["src", "tests"]
line-length = 100
exclude = ["experiments/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
packages = ["atlas_chat", "atlas_chat_validation_tools"]
python_version = "3.13"
disallow_untyped_defs = true
strict_optional = true
warn_unused_ignores = true
exclude = ["experiments/"]

[tool.coverage.run]
source = [
    "src/atlas_chat",
    "src/atlas_chat_validation_tools",
]
omit = ["experiments/*"]

[tool.coverage.report]
# Ratchet up as tests are added during refactor phases (see ROADMAP)
fail_under = 0
